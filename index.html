<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Postura V3 Testing Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:18px;
font-size:24px;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.connect{background:#3498db;color:white;}
.session{background:#f39c12;color:white;}
.start{background:#27ae60;color:white;}
.stop{background:#e74c3c;color:white;}
.export{background:#8e44ad;color:white;}

.card{
background:white;
width:320px;
margin:auto;
padding:18px;
margin-top:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.metric{
font-size:18px;
margin:6px;
}

.good{color:green;}
.bad{color:red;}

table{
margin:auto;
margin-top:25px;
border-collapse:collapse;
width:95%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f4f4f4;
}

canvas{
background:white;
margin-top:30px;
max-width:800px;
}

</style>

</head>

<body>

<header>POSTURA V3 TESTING PLATFORM</header>

<br>

<button class="connect" onclick="connectDevice()">Connect Device</button>
<button class="session" onclick="createSession()">Create Session</button>
<button class="start" onclick="startSession()">Start Recording</button>
<button class="stop" onclick="stopSession()">End Session</button>
<button class="export" onclick="exportCSV()">Export CSV</button>

<h3 id="connection">Device: Not Connected</h3>

<div class="card">

<div class="metric">Session Timer: <span id="timer">0</span> min</div>
<div class="metric">Status: <span id="status">--</span></div>
<div class="metric">Angle: <span id="angle">0</span>°</div>
<div class="metric">Slouch Count: <span id="slouch">0</span></div>
<div class="metric">Score: <span id="score">0</span></div>

</div>

<canvas id="angleChart"></canvas>

<h2>Session Results</h2>

<table id="sessionTable">

<tr>
<th>Session ID</th>
<th>User</th>
<th>Session Time (min)</th>
<th>Slouch Count</th>
<th>Slouch Frequency</th>
<th>Avg Angle</th>
<th>Avg Score</th>
</tr>

</table>

<script>

let characteristic;

let username="";
let sessionID=0;

let logging=false;
let sessionStart;
let timerInterval;

let angleSum=0;
let scoreSum=0;
let sampleCount=0;

let finalSlouch=0;

const ctx=document.getElementById("angleChart");

let chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Backbone Angle',
data:[]
}]
},
options:{
animation:false,
scales:{
y:{title:{display:true,text:"Angle"}},
x:{title:{display:true,text:"Samples"}}
}
}
});

async function connectDevice(){

const device=await navigator.bluetooth.requestDevice({
filters:[{namePrefix:"POSTURA"}],
optionalServices:["12345678-1234-1234-1234-1234567890ab"]
});

document.getElementById("connection").innerText="Device Connected";

const server=await device.gatt.connect();

const service=await server.getPrimaryService(
"12345678-1234-1234-1234-1234567890ab"
);

characteristic=await service.getCharacteristic(
"abcdefab-1234-1234-1234-abcdefabcdef"
);

await characteristic.startNotifications();

characteristic.addEventListener(
"characteristicvaluechanged",
handleData
);

}

function createSession(){

username=prompt("Enter user name");

}

async function startSession(){

if(username===""){
alert("Create session first");
return;
}

sessionID++;

sessionStart=Date.now();

angleSum=0;
scoreSum=0;
sampleCount=0;

chart.data.labels=[];
chart.data.datasets[0].data=[];
chart.update();

logging=true;

timerInterval=setInterval(()=>{

let elapsedSeconds=(Date.now()-sessionStart)/1000;

let minutes=(elapsedSeconds/60).toFixed(2);

document.getElementById("timer").innerText=minutes;

},1000);

if(characteristic){

let encoder=new TextEncoder();
let resetCmd=encoder.encode("RESET");

await characteristic.writeValue(resetCmd);

}

}

function stopSession(){

logging=false;

clearInterval(timerInterval);

let sessionTime=((Date.now()-sessionStart)/60000).toFixed(2);

let avgAngle=(angleSum/sampleCount).toFixed(2);

let avgScore=(scoreSum/sampleCount).toFixed(2);

let slouchFrequency=(finalSlouch/sessionTime).toFixed(3);

let table=document.getElementById("sessionTable");

let row=table.insertRow(-1);

row.insertCell(0).innerText=sessionID;
row.insertCell(1).innerText=username;
row.insertCell(2).innerText=sessionTime;
row.insertCell(3).innerText=finalSlouch;
row.insertCell(4).innerText=slouchFrequency;
row.insertCell(5).innerText=avgAngle;
row.insertCell(6).innerText=avgScore;

}

function handleData(event){

let value=new TextDecoder().decode(event.target.value);

let data=value.split(",");

let angle=parseFloat(data[0]);
let slouch=data[1];
let status=data[3];
let score=parseFloat(data[4]);

document.getElementById("angle").innerText=angle;
document.getElementById("slouch").innerText=slouch;
document.getElementById("score").innerText=score;

let statusEl=document.getElementById("status");

statusEl.innerText=status;

if(status==="GOOD"){
statusEl.className="good";
}else{
statusEl.className="bad";
}

if(logging){

angleSum+=angle;
scoreSum+=score;

sampleCount++;

finalSlouch=slouch;

chart.data.labels.push(sampleCount);
chart.data.datasets[0].data.push(angle);

chart.update();

}

}

function exportCSV(){

let table=document.getElementById("sessionTable");

let csv=[];

for(let i=0;i<table.rows.length;i++){

let row=[],cols=table.rows[i].querySelectorAll("td,th");

for(let j=0;j<cols.length;j++)
row.push(cols[j].innerText);

csv.push(row.join(","));

}

let blob=new Blob([csv.join("\n")],{type:"text/csv"});

let link=document.createElement("a");

link.download="postura_session_results.csv";

link.href=window.URL.createObjectURL(blob);

link.click();

}

</script>

</body>

</html>
